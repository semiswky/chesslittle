<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Satranç</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --board-light: #ebecd0;
            --board-dark: #739552;
            --highlight: rgba(255, 255, 51, 0.5);
            --last-move: rgba(155, 199, 0, 0.41);
            --valid-move: rgba(0, 0, 0, 0.2);
            --valid-capture: rgba(0, 0, 0, 0.2);
            --danger: #eb6150;
            --success: #81b64c;
            --brilliant: #1fb8ff;
            --accent: #4a90e2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #nusewky { position: absolute; top: 5px; left: 5px; font-size: 10px; opacity: 0.3; pointer-events: none; }

        #app { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1000px; padding: 20px; height: 100vh; max-height: 800px; }
        @media (max-width: 768px) { #app { flex-direction: column; height: auto; padding: 10px; gap: 10px; overflow-y: auto; justify-content: flex-start; } }

        /* Board Area */
        .board-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .player-info { display: flex; justify-content: space-between; width: 100%; max-width: 600px; align-items: center; padding: 0 5px; }
        .player-name { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .timer { background: #333; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 1.5rem; color: #fff; font-weight: bold; transition: background 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .timer.active { background: #fff; color: #000; }
        .timer.danger { color: var(--danger); }

        #board { position: relative; width: 100%; max-width: 600px; aspect-ratio: 1; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); border-radius: 4px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); user-select: none; touch-action: none; background: var(--board-dark); }
        .square { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        .square.light { background-color: var(--board-light); }
        .square.dark { background-color: var(--board-dark); }
        
        .rank-label, .file-label { position: absolute; font-size: 0.75rem; font-weight: bold; padding: 2px; opacity: 0.8; pointer-events: none; }
        .rank-label { top: 0; left: 2px; }
        .file-label { bottom: 0; right: 2px; }
        .square.light .rank-label, .square.light .file-label { color: var(--board-dark); }
        .square.dark .rank-label, .square.dark .file-label { color: var(--board-light); }

        .piece { width: 100%; height: 100%; position: absolute; top:0; left:0; background-size: 80%; background-position: center; background-repeat: no-repeat; cursor: grab; z-index: 10; transition: transform 0.25s cubic-bezier(0.4, 0.0, 0.2, 1); will-change: transform; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); }
        .piece:active { cursor: grabbing; z-index: 100; transition: none; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.5)); }

        .highlight-last { position: absolute; width: 100%; height: 100%; background: var(--last-move); pointer-events: none; }
        .highlight-selected { position: absolute; width: 100%; height: 100%; background: var(--highlight); pointer-events: none; }
        .highlight-check { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 80%); pointer-events: none; animation: pulse 1s infinite alternate; }
        
        .valid-move-hint { position: absolute; width: 30%; height: 30%; border-radius: 50%; background: var(--valid-move); pointer-events: none; z-index: 5; }
        .valid-capture-hint { position: absolute; width: 80%; height: 80%; border-radius: 50%; border: 6px solid var(--valid-capture); background: transparent; pointer-events: none; z-index: 5; }

        /* Sidebar */
        .sidebar { flex: 0 0 320px; background: var(--panel-bg); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        @media (max-width: 768px) { .sidebar { flex: 1; min-height: 300px; width: 100%; max-width: 600px; margin: 0 auto; } }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .controls-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #444; }
        button.primary { background: var(--accent); }
        button.primary:hover { background: #357abd; }
        
        .settings-group { display: flex; flex-direction: column; gap: 5px; }
        .settings-group label { font-size: 0.85rem; color: var(--text-muted); }
        select, input { padding: 8px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; outline: none; }

        .move-history-container { flex: 1; background: #2a2a2a; border-radius: 4px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; font-family: monospace; font-size: 0.9rem; }
        .move-row { display: flex; }
        .move-num { width: 30px; color: var(--text-muted); }
        .move-w, .move-b { flex: 1; cursor: pointer; padding: 2px 5px; border-radius: 3px; display: flex; justify-content: space-between; align-items: center; }
        .move-w:hover, .move-b:hover { background: #3a3a3a; }
        .move-eval { font-size: 0.75rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; margin-left: 5px; }
        .eval-good { background: var(--success); color: #fff; }
        .eval-bad { background: var(--danger); color: #fff; }
        .eval-brilliant { background: var(--brilliant); color: #000; font-style: italic; }

        /* Status & Modals */
        .status-text { text-align: center; font-weight: bold; font-size: 1.1rem; color: var(--accent); min-height: 24px; }
        
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal { background: var(--panel-bg); padding: 30px; border-radius: 8px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal h2 { margin-bottom: 15px; color: #fff; }
        .modal p { margin-bottom: 20px; color: #ccc; }
        
        .promo-options { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .promo-piece { width: 60px; height: 60px; background: #333; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; background-size: 80%; background-position: center; background-repeat: no-repeat; transition: transform 0.2s, background 0.2s; }
        .promo-piece:hover { transform: scale(1.1); background: #444; }

        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-effect { animation: shake 0.3s; }
    </style>
</head>
<body>
    <div id="nusewky">Nusewky</div>
    
    <div id="app">
        <div class="board-wrapper">
            <div class="player-info">
                <div class="player-name">Bot <span style="font-size:0.8em; color:var(--text-muted);">(Stockfish-lite)</span></div>
                <div class="timer" id="timer-b">10:00</div>
            </div>
            <div id="board"></div>
            <div class="player-info">
                <div class="player-name">Sen</div>
                <div class="timer active" id="timer-w">10:00</div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="status-text" id="status-display">Sıra Beyazda</div>
            <div class="controls">
                <div class="controls-row">
                    <button class="primary" id="btn-new">Yeni Oyun</button>
                    <button id="btn-undo">Geri Al</button>
                </div>
                <div class="controls-row">
                    <div class="settings-group" style="flex:1;">
                        <label>Süre (Dk)</label>
                        <select id="time-select">
                            <option value="3">3</option>
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="30">30</option>
                        </select>
                    </div>
                    <div class="settings-group" style="flex:1;">
                        <label>Bot Seviyesi</label>
                        <select id="bot-select">
                            <option value="1">Kolay</option>
                            <option value="3">Orta</option>
                            <option value="5" selected>Zor</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="move-history-container" id="move-history"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal" id="promo-modal" style="display:none;">
            <h2>Terfi Seçimi</h2>
            <div class="promo-options" id="promo-options"></div>
        </div>
        <div class="modal" id="gameover-modal" style="display:none;">
            <h2 id="gameover-title">Oyun Bitti</h2>
            <p id="gameover-reason"></p>
            <button class="primary" id="btn-modal-new">Yeni Oyun</button>
        </div>
    </div>

    <script>
        // --- CHESS LOGIC (0x88 Based for Performance & Simplicity) ---
        const SQUARES = {
            a8: 0, b8: 1, c8: 2, d8: 3, e8: 4, f8: 5, g8: 6, h8: 7,
            a1: 112, b1: 113, c1: 114, d1: 115, e1: 116, f1: 117, g1: 118, h1: 119
        };
        const PIECES = { p: 1, n: 2, b: 3, r: 4, q: 5, k: 6 };
        const COLORS = { w: 0, b: 1 };
        const BITS = { NORMAL: 1, CAPTURE: 2, BIG_PAWN: 4, EP_CAPTURE: 8, PROMOTION: 16, KSIDE_CASTLE: 32, QSIDE_CASTLE: 64 };
        const ROOKS = {
            w: [{square: SQUARES.a1, flag: 64}, {square: SQUARES.h1, flag: 32}],
            b: [{square: SQUARES.a8, flag: 64}, {square: SQUARES.h8, flag: 32}]
        };

        const PIECE_OFFSETS = {
            n: [-18, -33, -31, -14, 18, 33, 31, 14],
            b: [-17, -15, 15, 17],
            r: [-16, -1, 1, 16],
            q: [-17, -16, -15, -1, 1, 15, 16, 17],
            k: [-17, -16, -15, -1, 1, 15, 16, 17]
        };

        class ChessEngine {
            constructor() { this.reset(); }
            
            reset() {
                this.board = new Array(128);
                this.kings = { w: SQUARES.e1, b: SQUARES.e8 };
                this.turn = COLORS.w;
                this.castling = { w: 96, b: 96 }; 
                this.ep_square = null;
                this.half_moves = 0;
                this.move_number = 1;
                this.history = [];
                this.load("rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1");
            }

            load(fen) {
                let tokens = fen.split(/\s+/);
                let position = tokens[0];
                let square = 0;
                this.board = new Array(128);
                
                for (let i = 0; i < position.length; i++) {
                    let piece = position.charAt(i);
                    if (piece === '/') square += 8;
                    else if (is_digit(piece)) square += parseInt(piece, 10);
                    else {
                        let color = (piece < 'a') ? COLORS.w : COLORS.b;
                        let type = PIECES[piece.toLowerCase()];
                        this.board[square] = { type: type, color: color };
                        if (type === PIECES.k) this.kings[color] = square;
                        square++;
                    }
                }
                
                this.turn = tokens[1] === 'w' ? COLORS.w : COLORS.b;
                this.castling = { w: 0, b: 0 };
                if (tokens[2].indexOf('K') > -1) this.castling.w |= 32;
                if (tokens[2].indexOf('Q') > -1) this.castling.w |= 64;
                if (tokens[2].indexOf('k') > -1) this.castling.b |= 32;
                if (tokens[2].indexOf('q') > -1) this.castling.b |= 64;
                
                this.ep_square = (tokens[3] === '-') ? null : SQUARES[tokens[3]];
                this.half_moves = parseInt(tokens[4], 10) || 0;
                this.move_number = parseInt(tokens[5], 10) || 1;
            }

            generate_moves(options = { legal: true }) {
                let moves = [];
                let us = this.turn;
                let them = us === COLORS.w ? COLORS.b : COLORS.w;

                for (let i = 0; i < 128; i++) {
                    if (i & 0x88) { i += 7; continue; }
                    let piece = this.board[i];
                    if (!piece || piece.color !== us) continue;

                    if (piece.type === PIECES.p) {
                        let step = us === COLORS.w ? -16 : 16;
                        let start_rank = us === COLORS.w ? 6 : 1;
                        let rank = i >> 4;
                        
                        let sq = i + step;
                        if (!this.board[sq]) {
                            this.add_pawn_move(moves, i, sq, BITS.NORMAL);
                            let sq2 = i + step * 2;
                            if (rank === start_rank && !this.board[sq2]) {
                                moves.push(this.build_move(i, sq2, BITS.BIG_PAWN));
                            }
                        }
                        
                        for (let j = -1; j <= 1; j += 2) {
                            let cap_sq = i + step + j;
                            if (cap_sq & 0x88) continue;
                            
                            if (this.board[cap_sq] && this.board[cap_sq].color === them) {
                                this.add_pawn_move(moves, i, cap_sq, BITS.CAPTURE);
                            } else if (cap_sq === this.ep_square) {
                                moves.push(this.build_move(i, cap_sq, BITS.EP_CAPTURE));
                            }
                        }
                    } else {
                        let type_str = Object.keys(PIECES).find(key => PIECES[key] === piece.type);
                        let offsets = PIECE_OFFSETS[type_str];
                        for (let j = 0; j < offsets.length; j++) {
                            let offset = offsets[j];
                            let sq = i;
                            while (true) {
                                sq += offset;
                                if (sq & 0x88) break;
                                
                                if (!this.board[sq]) {
                                    moves.push(this.build_move(i, sq, BITS.NORMAL));
                                } else {
                                    if (this.board[sq].color === them) {
                                        moves.push(this.build_move(i, sq, BITS.CAPTURE));
                                    }
                                    break;
                                }
                                if (piece.type === PIECES.n || piece.type === PIECES.k) break;
                            }
                        }
                    }
                }

                if (us === COLORS.w) {
                    if (this.castling.w & 32) { // K
                        if (!this.board[SQUARES.f1] && !this.board[SQUARES.g1] && !this.attacked(SQUARES.e1, them) && !this.attacked(SQUARES.f1, them)) {
                            moves.push(this.build_move(SQUARES.e1, SQUARES.g1, BITS.KSIDE_CASTLE));
                        }
                    }
                    if (this.castling.w & 64) { // Q
                        if (!this.board[SQUARES.d1] && !this.board[SQUARES.c1] && !this.board[SQUARES.b1] && !this.attacked(SQUARES.e1, them) && !this.attacked(SQUARES.d1, them)) {
                            moves.push(this.build_move(SQUARES.e1, SQUARES.c1, BITS.QSIDE_CASTLE));
                        }
                    }
                } else {
                    if (this.castling.b & 32) { // k
                        if (!this.board[SQUARES.f8] && !this.board[SQUARES.g8] && !this.attacked(SQUARES.e8, them) && !this.attacked(SQUARES.f8, them)) {
                            moves.push(this.build_move(SQUARES.e8, SQUARES.g8, BITS.KSIDE_CASTLE));
                        }
                    }
                    if (this.castling.b & 64) { // q
                        if (!this.board[SQUARES.d8] && !this.board[SQUARES.c8] && !this.board[SQUARES.b8] && !this.attacked(SQUARES.e8, them) && !this.attacked(SQUARES.d8, them)) {
                            moves.push(this.build_move(SQUARES.e8, SQUARES.c8, BITS.QSIDE_CASTLE));
                        }
                    }
                }

                if (!options.legal) return moves;

                let legal_moves = [];
                for (let i = 0; i < moves.length; i++) {
                    this.make_move(moves[i]);
                    if (!this.attacked(this.kings[us], them)) legal_moves.push(moves[i]);
                    this.undo_move();
                }
                return legal_moves;
            }

            add_pawn_move(moves, from, to, flag) {
                let rank = to >> 4;
                if (rank === 0 || rank === 7) {
                    moves.push(this.build_move(from, to, flag | BITS.PROMOTION, PIECES.q));
                    moves.push(this.build_move(from, to, flag | BITS.PROMOTION, PIECES.r));
                    moves.push(this.build_move(from, to, flag | BITS.PROMOTION, PIECES.b));
                    moves.push(this.build_move(from, to, flag | BITS.PROMOTION, PIECES.n));
                } else {
                    moves.push(this.build_move(from, to, flag));
                }
            }

            build_move(from, to, flags, promotion) {
                let move = { from: from, to: to, flags: flags, piece: this.board[from].type, color: this.board[from].color };
                if (promotion) move.promotion = promotion;
                if (this.board[to]) move.captured = this.board[to].type;
                else if (flags & BITS.EP_CAPTURE) move.captured = PIECES.p;
                return move;
            }

            make_move(move) {
                let us = this.turn;
                let them = us === COLORS.w ? COLORS.b : COLORS.w;
                this.history.push({
                    move: move, kings: { w: this.kings.w, b: this.kings.b }, turn: this.turn,
                    castling: { w: this.castling.w, b: this.castling.b }, ep_square: this.ep_square,
                    half_moves: this.half_moves, move_number: this.move_number
                });

                this.board[move.to] = this.board[move.from];
                this.board[move.from] = null;

                if (move.flags & BITS.EP_CAPTURE) {
                    this.board[move.to + (us === COLORS.w ? 16 : -16)] = null;
                }

                if (move.flags & BITS.PROMOTION) {
                    this.board[move.to] = { type: move.promotion, color: us };
                }

                if (move.piece === PIECES.k) {
                    this.kings[us] = move.to;
                    if (move.flags & BITS.KSIDE_CASTLE) {
                        let castling_to = move.to - 1;
                        let castling_from = move.to + 1;
                        this.board[castling_to] = this.board[castling_from];
                        this.board[castling_from] = null;
                    } else if (move.flags & BITS.QSIDE_CASTLE) {
                        let castling_to = move.to + 1;
                        let castling_from = move.to - 2;
                        this.board[castling_to] = this.board[castling_from];
                        this.board[castling_from] = null;
                    }
                    this.castling[us] = 0;
                }

                if (this.castling[us]) {
                    for (let i = 0; i < ROOKS[us].length; i++) {
                        if (move.from === ROOKS[us][i].square && (this.castling[us] & ROOKS[us][i].flag)) {
                            this.castling[us] ^= ROOKS[us][i].flag;
                            break;
                        }
                    }
                }
                if (this.castling[them]) {
                    for (let i = 0; i < ROOKS[them].length; i++) {
                        if (move.to === ROOKS[them][i].square && (this.castling[them] & ROOKS[them][i].flag)) {
                            this.castling[them] ^= ROOKS[them][i].flag;
                            break;
                        }
                    }
                }

                if (move.flags & BITS.BIG_PAWN) this.ep_square = move.to + (us === COLORS.w ? 16 : -16);
                else this.ep_square = null;

                if (move.piece === PIECES.p || (move.flags & (BITS.CAPTURE | BITS.EP_CAPTURE))) this.half_moves = 0;
                else this.half_moves++;

                if (us === COLORS.b) this.move_number++;
                this.turn = them;
            }

            undo_move() {
                let old = this.history.pop();
                if (!old) return;
                let move = old.move;
                this.kings = old.kings;
                this.turn = old.turn;
                this.castling = old.castling;
                this.ep_square = old.ep_square;
                this.half_moves = old.half_moves;
                this.move_number = old.move_number;

                let us = this.turn;
                let them = us === COLORS.w ? COLORS.b : COLORS.w;

                this.board[move.from] = this.board[move.to];
                this.board[move.from].type = move.piece; 
                this.board[move.to] = null;

                if (move.flags & BITS.CAPTURE) this.board[move.to] = { type: move.captured, color: them };
                else if (move.flags & BITS.EP_CAPTURE) this.board[move.to + (us === COLORS.w ? 16 : -16)] = { type: PIECES.p, color: them };

                if (move.flags & (BITS.KSIDE_CASTLE | BITS.QSIDE_CASTLE)) {
                    let castling_to, castling_from;
                    if (move.flags & BITS.KSIDE_CASTLE) { castling_to = move.to + 1; castling_from = move.to - 1; }
                    else { castling_to = move.to - 2; castling_from = move.to + 1; }
                    this.board[castling_to] = this.board[castling_from];
                    this.board[castling_from] = null;
                }
            }

            attacked(sq, color) {
                for (let i = 0; i < 128; i++) {
                    if (i & 0x88) { i += 7; continue; }
                    if (!this.board[i] || this.board[i].color !== color) continue;
                    
                    let piece = this.board[i];
                    if (piece.type === PIECES.p) {
                        let dir = color === COLORS.w ? -16 : 16;
                        if (i + dir - 1 === sq || i + dir + 1 === sq) return true;
                    } else {
                        let type_str = Object.keys(PIECES).find(key => PIECES[key] === piece.type);
                        let offsets = PIECE_OFFSETS[type_str];
                        for (let j = 0; j < offsets.length; j++) {
                            let offset = offsets[j];
                            let s = i;
                            while (true) {
                                s += offset;
                                if (s & 0x88) break;
                                if (s === sq) return true;
                                if (this.board[s]) break;
                                if (piece.type === PIECES.n || piece.type === PIECES.k) break;
                            }
                        }
                    }
                }
                return false;
            }

            in_check() { return this.attacked(this.kings[this.turn], this.turn === COLORS.w ? COLORS.b : COLORS.w); }
            in_checkmate() { return this.in_check() && this.generate_moves().length === 0; }
            in_stalemate() { return !this.in_check() && this.generate_moves().length === 0; }
            insufficient_material() {
                let pieces = {};
                for (let i = 0; i < 128; i++) {
                    if (i & 0x88) { i+=7; continue; }
                    let p = this.board[i];
                    if (p) { pieces[p.type] = (pieces[p.type] || 0) + 1; if (p.type === PIECES.p || p.type === PIECES.r || p.type === PIECES.q) return false; }
                }
                let count = Object.keys(pieces).reduce((a, b) => a + pieces[b], 0);
                if (count === 2) return true; 
                if (count === 3 && (pieces[PIECES.b] === 1 || pieces[PIECES.n] === 1)) return true;
                return false;
            }
            in_draw() { return this.half_moves >= 100 || this.in_stalemate() || this.insufficient_material(); }
            game_over() { return this.half_moves >= 100 || this.in_checkmate() || this.in_stalemate() || this.insufficient_material(); }
            
            get_san(move) {
                let san = "";
                if (move.piece !== PIECES.p) san = Object.keys(PIECES).find(key => PIECES[key] === move.piece).toUpperCase();
                
                if (move.flags & (BITS.CAPTURE | BITS.EP_CAPTURE)) {
                    if (move.piece === PIECES.p) san += sq_to_alg(move.from)[0];
                    san += "x";
                }
                san += sq_to_alg(move.to);
                if (move.flags & BITS.PROMOTION) san += "=" + Object.keys(PIECES).find(key => PIECES[key] === move.promotion).toUpperCase();
                
                this.make_move(move);
                if (this.in_checkmate()) san += "#";
                else if (this.in_check()) san += "+";
                this.undo_move();

                if (move.flags & BITS.KSIDE_CASTLE) san = "O-O";
                if (move.flags & BITS.QSIDE_CASTLE) san = "O-O-O";
                return san;
            }
        }

        function is_digit(c) { return '0123456789'.indexOf(c) !== -1; }
        function alg_to_sq(alg) { let f = alg.charCodeAt(0) - 'a'.charCodeAt(0); let r = 8 - parseInt(alg[1], 10); return (r << 4) | f; }
        function sq_to_alg(sq) { let f = String.fromCharCode('a'.charCodeAt(0) + (sq & 7)); let r = 8 - (sq >> 4); return f + r; }

        // --- BOT & EVALUATION ---
        const PIECE_VALS = { [PIECES.p]: 100, [PIECES.n]: 320, [PIECES.b]: 330, [PIECES.r]: 500, [PIECES.q]: 900, [PIECES.k]: 20000 };
        const PST = {
            [PIECES.p]: [
                 0,  0,  0,  0,  0,  0,  0,  0,
                50, 50, 50, 50, 50, 50, 50, 50,
                10, 10, 20, 30, 30, 20, 10, 10,

            ],

                -10, 10, 10, 10, 10, 10, 10,-10,
                -10,  5,  0,  0,  0,  0,  5,-10,
                -20,-10,-10,-10,-10,-10,-10,-20
            ],
            [PIECES.r]: [
                  0,  0,  0,  0,  0,  0,  0,  0,
                  5, 10, 10, 10, 10, 10, 10,  5,
                 -5,  0,  0,  0,  0,  0,  0, -5,
                 -5,  0,  0,  0,  0,  0,  0, -5,
                 -5,  0,  0,  0,  0,  0,  0, -5,
                 -5,  0,  0,  0,  0,  0,  0, -5,
                 -5,  0,  0,  0,  0,  0,  0, -5,
                  0,  0,  0,  5,  5,  0,  0,  0
            ],
            [PIECES.q]: [
                -20,-10,-10, -5, -5,-10,-10,-20,
                -10,  0,  0,  0,  0,  0,  0,-10,
                -10,  0,  5,  5,  5,  5,  0,-10,
                 -5,  0,  5,  5,  5,  5,  0, -5,
                  0,  0,  5,  5,  5,  5,  0, -5,
                -10,  5,  5,  5,  5,  5,  0,-10,
                -10,  0,  5,  0,  0,  0,  0,-10,
                -20,-10,-10, -5, -5,-10,-10,-20
            ],
            [PIECES.k]: [
                -30,-40,-40,-50,-50,-40,-40,-30,
                -30,-40,-40,-50,-50,-40,-40,-30,
                -30,-40,-40,-50,-50,-40,-40,-30,
                -30,-40,-40,-50,-50,-40,-40,-30,
                -20,-30,-30,-40,-40,-30,-30,-20,
                -10,-20,-20,-20,-20,-20,-20,-10,
                 20, 20,  0,  0,  0,  0, 20, 20,
                 20, 30, 10,  0,  0, 10, 30, 20
            ]
        };

        function evaluate(engine) {
            let score = 0;
            for (let i = 0; i < 128; i++) {
                if (i & 0x88) { i += 7; continue; }
                let p = engine.board[i];
                if (!p) continue;
                let val = PIECE_VALS[p.type];
                let rank = i >> 4; let file = i & 7;
                let pst_idx = p.color === COLORS.w ? (rank * 8 + file) : ((7 - rank) * 8 + file);
                val += PST[p.type][pst_idx];
                score += p.color === COLORS.w ? val : -val;
            }
            return engine.turn === COLORS.w ? score : -score;
        }

        async function search_moves(engine, depth) {
            let nodes = 0;
            let startTime = Date.now();
            let timeLimit = depth > 3 ? 1000 : 300; 

            function alphabeta(alpha, beta, d) {
                nodes++;
                if (d === 0) return quiescence(alpha, beta);
                let moves = engine.generate_moves();
                if (moves.length === 0) return engine.in_check() ? -30000 + (depth-d) : 0;
                
                // Simple move ordering: captures first
                moves.sort((a, b) => (b.flags & 14) - (a.flags & 14));

                let bestVal = -Infinity;
                for (let i=0; i<moves.length; i++) {
                    engine.make_move(moves[i]);
                    let val = -alphabeta(-beta, -alpha, d - 1);
                    engine.undo_move();
                    if (val >= beta) return beta;
                    if (val > alpha) alpha = val;
                    if (val > bestVal) bestVal = val;
                    if (nodes % 1000 === 0 && Date.now() - startTime > timeLimit) break; 
                }
                return bestVal;
            }

            function quiescence(alpha, beta) {
                let stand_pat = evaluate(engine);
                if (stand_pat >= beta) return beta;
                if (alpha < stand_pat) alpha = stand_pat;
                
                let moves = engine.generate_moves().filter(m => m.flags & (BITS.CAPTURE|BITS.EP_CAPTURE|BITS.PROMOTION));
                moves.sort((a, b) => PIECE_VALS[b.captured || 0] - PIECE_VALS[a.captured || 0]);

                for (let i=0; i<moves.length; i++) {
                    engine.make_move(moves[i]);
                    let val = -quiescence(-beta, -alpha);
                    engine.undo_move();
                    if (val >= beta) return beta;
                    if (val > alpha) alpha = val;
                }
                return alpha;
            }

            let bestMove = null;
            let bestScore = -Infinity;
            let moves = engine.generate_moves();
            if (moves.length === 0) return null;
            
            moves.sort((a, b) => (b.flags & 14) - (a.flags & 14));

            for (let i = 0; i < moves.length; i++) {
                engine.make_move(moves[i]);
                let score = -alphabeta(-Infinity, Infinity, depth - 1);
                engine.undo_move();
                if (score > bestScore) { bestScore = score; bestMove = moves[i]; }
                
                // Yield to event loop to keep UI somewhat responsive
                if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
            }
            return { move: bestMove, score: bestScore };
        }

        const PIECE_TYPES_REV = { 1:'p', 2:'n', 3:'b', 4:'r', 5:'q', 6:'k' };

        class ChessUI {
            constructor() {
                this.engine = new ChessEngine();
                this.boardEl = document.getElementById('board');
                this.historyEl = document.getElementById('move-history');
                this.statusEl = document.getElementById('status-display');
                
                this.draggedPiece = null;
                this.selectedSq = null;
                this.legalMoves = [];
                this.lastMove = null;
                
                this.times = { w: 600, b: 600 };
                this.timerInterval = null;
                this.isBotThinking = false;
                
                this.evalHistory = [];
                this.humanEval = 0;

                this.initBoard();
                this.attachEvents();
                this.updateUI();
                this.startTimer();
            }

            initBoard() {
                this.boardEl.innerHTML = '';
                for (let r = 0; r < 8; r++) {
                    for (let f = 0; f < 8; f++) {
                        let sq = (r << 4) | f;
                        let div = document.createElement('div');
                        div.className = `square ${(r + f) % 2 === 0 ? 'light' : 'dark'}`;
                        div.dataset.sq = sq;
                        
                        if (f === 0) { let lbl = document.createElement('div'); lbl.className='rank-label'; lbl.innerText = 8-r; div.appendChild(lbl); }
                        if (r === 7) { let lbl = document.createElement('div'); lbl.className='file-label'; lbl.innerText = String.fromCharCode(97+f); div.appendChild(lbl); }
                        
                        this.boardEl.appendChild(div);
                    }
                }
                this.drawPieces();
            }

            drawPieces() {
                document.querySelectorAll('.piece').forEach(e => e.remove());
                let pieceWidth = this.boardEl.clientWidth / 8;
                for (let i = 0; i < 128; i++) {
                    if (i & 0x88) { i += 7; continue; }
                    let p = this.engine.board[i];
                    if (p) {
                        let div = document.createElement('div');
                        div.className = 'piece';
                        div.dataset.sq = i;
                        div.style.backgroundImage = `url('${SVGS[p.color === COLORS.w ? 'w' : 'b'][PIECE_TYPES_REV[p.type]]}')`;
                        
                        let r = i >> 4; let f = i & 7;
                        div.style.transform = `translate(${f * 100}%, ${r * 100}%)`;
                        
                        div.addEventListener('pointerdown', e => this.onDragStart(e, div, i));
                        this.boardEl.appendChild(div);
                    }
                }
                this.drawHighlights();
            }

            drawHighlights() {
                document.querySelectorAll('.highlight-last, .highlight-selected, .highlight-check, .valid-move-hint, .valid-capture-hint').forEach(e => e.remove());
                
                if (this.lastMove) {
                    this.addHighlight(this.lastMove.from, 'highlight-last');
                    this.addHighlight(this.lastMove.to, 'highlight-last');
                }
                if (this.selectedSq !== null) {
                    this.addHighlight(this.selectedSq, 'highlight-selected');
                    for (let m of this.legalMoves) {
                        if (m.from === this.selectedSq) {
                            let r = m.to >> 4; let f = m.to & 7;
                            let sqDiv = this.boardEl.children[r * 8 + f];
                            let hint = document.createElement('div');
                            hint.className = (m.flags & (BITS.CAPTURE|BITS.EP_CAPTURE)) ? 'valid-capture-hint' : 'valid-move-hint';
                            sqDiv.appendChild(hint);
                        }
                    }
                }
                if (this.engine.in_check()) {
                    let kingSq = this.engine.kings[this.engine.turn];
                    this.addHighlight(kingSq, 'highlight-check');
                }
            }

            addHighlight(sq, className) {
                let r = sq >> 4; let f = sq & 7;
                let div = document.createElement('div');
                div.className = className;
                this.boardEl.children[r * 8 + f].appendChild(div);
            }

            onDragStart(e, pieceDiv, sq) {
                if (this.engine.turn !== COLORS.w || this.isBotThinking || this.engine.game_over()) return;
                
                let p = this.engine.board[sq];
                if (!p || p.color !== COLORS.w) return;

                e.preventDefault();
                this.draggedPiece = pieceDiv;
                this.selectedSq = sq;
                this.legalMoves = this.engine.generate_moves().filter(m => m.from === sq);
                this.drawHighlights();

                pieceDiv.style.zIndex = 100;
                pieceDiv.style.transition = 'none';

                let boardRect = this.boardEl.getBoundingClientRect();
                let sqSize = boardRect.width / 8;

                const moveHandler = (ev) => {
                    let clientX = ev.clientX || (ev.touches ? ev.touches[0].clientX : 0);
                    let clientY = ev.clientY || (ev.touches ? ev.touches[0].clientY : 0);
                    let x = clientX - boardRect.left - sqSize / 2;
                    let y = clientY - boardRect.top - sqSize / 2;
                    pieceDiv.style.transform = `translate(${x}px, ${y}px)`;
                };

                const upHandler = (ev) => {
                    document.removeEventListener('pointermove', moveHandler);
                    document.removeEventListener('pointerup', upHandler);
                    
                    pieceDiv.style.zIndex = 10;
                    pieceDiv.style.transition = 'transform 0.25s cubic-bezier(0.4, 0.0, 0.2, 1)';

                    let clientX = ev.clientX || (ev.changedTouches ? ev.changedTouches[0].clientX : 0);
                    let clientY = ev.clientY || (ev.changedTouches ? ev.changedTouches[0].clientY : 0);
                    
                    let col = Math.floor((clientX - boardRect.left) / sqSize);
                    let row = Math.floor((clientY - boardRect.top) / sqSize);
                    let targetSq = (row << 4) | col;

                    if (col >= 0 && col < 8 && row >= 0 && row < 8) {
                        let move = this.legalMoves.find(m => m.to === targetSq && (!m.promotion || m.promotion === PIECES.q));
                        if (move) {
                            if (move.flags & BITS.PROMOTION) {
                                this.showPromotionModal(move);
                            } else {
                                this.makeMoveUI(move);
                            }
                        } else {
                            this.snapBack(pieceDiv, sq);
                            // Keep selection if clicking on same square
                            if (targetSq !== sq) { this.selectedSq = null; this.drawHighlights(); }
                        }
                    } else {
                        this.snapBack(pieceDiv, sq);
                        this.selectedSq = null;
                        this.drawHighlights();
                    }
                    this.draggedPiece = null;
                };

                document.addEventListener('pointermove', moveHandler, {passive: false});
                document.addEventListener('pointerup', upHandler);
            }

            snapBack(pieceDiv, sq) {
                let r = sq >> 4; let f = sq & 7;
                pieceDiv.style.transform = `translate(${f * 100}%, ${r * 100}%)`;
            }

            showPromotionModal(move) {
                let modal = document.getElementById('promo-modal');
                let overlay = document.getElementById('modal-overlay');
                let opts = document.getElementById('promo-options');
                opts.innerHTML = '';
                
                ['q', 'r', 'b', 'n'].forEach(pt => {
                    let div = document.createElement('div');
                    div.className = 'promo-piece';
                    div.style.backgroundImage = `url('${SVGS[this.engine.turn === COLORS.w ? 'w' : 'b'][pt]}')`;
                    div.onclick = () => {
                        overlay.style.display = 'none';
                        let finalMove = this.legalMoves.find(m => m.to === move.to && m.promotion === PIECES[pt]);
                        this.makeMoveUI(finalMove);
                    };
                    opts.appendChild(div);
                });
                overlay.style.display = 'flex';
                modal.style.display = 'block';
                document.getElementById('gameover-modal').style.display = 'none';
            }

            async makeMoveUI(move) {
                let san = this.engine.get_san(move);
                let isCapture = (move.flags & (BITS.CAPTURE|BITS.EP_CAPTURE)) !== 0;
                
                // Eval Quality for Human
                let evalClass = "";
                let evalText = "";
                if (this.engine.turn === COLORS.w && this.engine.history.length > 0) {
                    let curEval = evaluate(this.engine);
                    this.engine.make_move(move);
                    let newEval = evaluate(this.engine);
                    this.engine.undo_move();
                    let diff = newEval - curEval;
                    
                    if (diff < -200) { evalClass = 'eval-bad'; evalText = "Hata"; }
                    else if (diff > 150) { evalClass = 'eval-brilliant'; evalText = "!!"; }
                    else if (diff > -30) { evalClass = 'eval-good'; evalText = "İyi"; }
                }

                this.engine.make_move(move);
                this.lastMove = move;
                this.selectedSq = null;
                this.drawPieces();
                
                if (isCapture) {
                    this.boardEl.classList.add('shake-effect');
                    setTimeout(() => this.boardEl.classList.remove('shake-effect'), 300);
                }

                this.addHistory(san, move.color, evalClass, evalText);
                this.checkGameOver();
                
                if (!this.engine.game_over() && this.engine.turn === COLORS.b) {
                    this.isBotThinking = true;
                    this.updateUI();
                    setTimeout(() => this.makeBotMove(), 50);
                } else {
                    this.updateUI();
                }
            }

            async makeBotMove() {
                let level = parseInt(document.getElementById('bot-select').value);
                let res = await search_moves(this.engine, level);
                this.isBotThinking = false;
                if (res && res.move) {
                    this.makeMoveUI(res.move);
                }
            }

            addHistory(san, color, evalClass, evalText) {
                if (color === COLORS.w) {
                    let row = document.createElement('div');
                    row.className = 'move-row';
                    row.innerHTML = `<div class="move-num">${this.engine.move_number - 1}.</div>
                                     <div class="move-w">${san} ${evalText ? `<span class="move-eval ${evalClass}">${evalText}</span>` : ''}</div>
                                     <div class="move-b"></div>`;
                    this.historyEl.appendChild(row);
                } else {
                    let rows = this.historyEl.querySelectorAll('.move-row');
                    if (rows.length > 0) {
                        let lastRow = rows[rows.length - 1];
                        lastRow.querySelector('.move-b').innerHTML = san;
                    }
                }
                this.historyEl.scrollTop = this.historyEl.scrollHeight;
            }

            checkGameOver() {
                if (this.engine.game_over() || this.times.w <= 0 || this.times.b <= 0) {
                    clearInterval(this.timerInterval);
                    let title = "Oyun Bitti";
                    let reason = "";
                    
                    if (this.times.w <= 0) { reason = "Süre Bitti. Siyah Kazandı."; }
                    else if (this.times.b <= 0) { reason = "Süre Bitti. Beyaz Kazandı."; }
                    else if (this.engine.in_checkmate()) { reason = `Mat! ${this.engine.turn === COLORS.w ? 'Siyah' : 'Beyaz'} Kazandı.`; }
                    else if (this.engine.in_stalemate()) { reason = "Pat! Berabere."; }
                    else if (this.engine.insufficient_material()) { reason = "Yetersiz Materyal. Berabere."; }
                    else if (this.engine.half_moves >= 100) { reason = "50 Hamle Kuralı. Berabere."; }

                    document.getElementById('gameover-title').innerText = title;
                    document.getElementById('gameover-reason').innerText = reason;
                    document.getElementById('modal-overlay').style.display = 'flex';
                    document.getElementById('gameover-modal').style.display = 'block';
                    document.getElementById('promo-modal').style.display = 'none';
                    this.statusEl.innerText = reason;
                }
            }

            updateUI() {
                if (this.engine.game_over()) return;
                this.statusEl.innerText = this.isBotThinking ? "Bot Düşünüyor..." : "Senin Sıran";
                document.getElementById('timer-w').classList.toggle('active', this.engine.turn === COLORS.w);
                document.getElementById('timer-b').classList.toggle('active', this.engine.turn === COLORS.b);
            }

            formatTime(seconds) {
                let m = Math.floor(seconds / 60);
                let s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    if (this.engine.game_over() || this.isBotThinking && this.engine.turn === COLORS.w) return;
                    
                    let active = this.engine.turn === COLORS.w ? 'w' : 'b';
                    this.times[active] -= 0.1;
                    
                    let el = document.getElementById(`timer-${active}`);
                    el.innerText = this.formatTime(this.times[active]);
                    if (this.times[active] <= 10) el.classList.add('danger');
                    else el.classList.remove('danger');
                    
                    if (this.times[active] <= 0) this.checkGameOver();
                }, 100);
            }

            resetGame() {
                this.engine.reset();
                this.lastMove = null;
                this.selectedSq = null;
                this.isBotThinking = false;
                this.historyEl.innerHTML = '';
                
                let timeVal = parseInt(document.getElementById('time-select').value) * 60;
                this.times = { w: timeVal, b: timeVal };
                document.getElementById('timer-w').innerText = this.formatTime(this.times.w);
                document.getElementById('timer-b').innerText = this.formatTime(this.times.b);
                document.getElementById('timer-w').classList.remove('danger');
                document.getElementById('timer-b').classList.remove('danger');
                document.getElementById('modal-overlay').style.display = 'none';
                
                this.initBoard();
                this.updateUI();
                this.startTimer();
            }

            undo() {
                if (this.isBotThinking || this.engine.history.length === 0) return;
                this.engine.undo_move();
                if (this.engine.turn === COLORS.b) this.engine.undo_move(); // Undo bot move too
                
                this.lastMove = this.engine.history.length > 0 ? this.engine.history[this.engine.history.length-1].move : null;
                
                // Update History UI
                let rows = this.historyEl.querySelectorAll('.move-row');
                if (rows.length > 0) rows[rows.length - 1].remove();

                this.drawPieces();
                this.updateUI();
            }

            attachEvents() {
                document.getElementById('btn-new').onclick = () => this.resetGame();
                document.getElementById('btn-modal-new').onclick = () => this.resetGame();
                document.getElementById('btn-undo').onclick = () => this.undo();
                document.getElementById('time-select').onchange = () => this.resetGame();
                
                this.boardEl.addEventListener('click', (e) => {
                    if (this.draggedPiece) return;
                    let target = e.target.closest('.square');
                    if (!target) return;
                    let sq = parseInt(target.dataset.sq);
                    
                    if (this.selectedSq !== null) {
                        let move = this.legalMoves.find(m => m.to === sq && (!m.promotion || m.promotion === PIECES.q));
                        if (move) {
                            if (move.flags & BITS.PROMOTION) this.showPromotionModal(move);
                            else this.makeMoveUI(move);
                        } else {
                            let p = this.engine.board[sq];
                            if (p && p.color === COLORS.w) {
                                this.selectedSq = sq;
                                this.legalMoves = this.engine.generate_moves().filter(m => m.from === sq);
                                this.drawHighlights();
                            } else {
                                this.selectedSq = null;
                                this.drawHighlights();
                            }
                        }
                    } else {
                        let p = this.engine.board[sq];
                        if (p && p.color === COLORS.w) {
                            this.selectedSq = sq;
                            this.legalMoves = this.engine.generate_moves().filter(m => m.from === sq);
                            this.drawHighlights();
                        }
                    }
                });
            }
        }

        window.onload = () => { new ChessUI(); };
    </script>
</body>
</html>
